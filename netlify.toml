[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PUBLIC_SITE_URL = "https://allo-maison.ma"
  NEXT_PUBLIC_WHATSAPP_NUMBER = "212661409190"
  # RESEND_API_KEY → set in Netlify UI (Site settings > Environment variables)
  RESEND_FROM = "noreply@notification.allo-maison.ma"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonicalization redirects (fallback — Cloudflare Always HTTPS + www->root may already handle these at the edge).
# Goal: a single 301 from any variant (http, www, http+www) straight to https://allo-maison.ma/*
# Keeps redirect chains at 1 hop and preserves PageRank.

# http + www → https root
[[redirects]]
  from = "http://www.allo-maison.ma/*"
  to = "https://allo-maison.ma/:splat"
  status = 301
  force = true

# https + www → https root
[[redirects]]
  from = "https://www.allo-maison.ma/*"
  to = "https://allo-maison.ma/:splat"
  status = 301
  force = true

# http (no www) → https
[[redirects]]
  from = "http://allo-maison.ma/*"
  to = "https://allo-maison.ma/:splat"
  status = 301
  force = true

# --------------------------------------------------------------------
# Legacy WordPress redirects (mirror of next.config.ts `redirects`).
# These run at the Netlify edge BEFORE the Next.js runtime, which lets
# us collapse the "/foo/ -> /foo -> /final" 2-hop chain (caused by
# Next.js `trailingSlash: false` normalization) into a single 301.
# Must stay in sync with next.config.ts.
# --------------------------------------------------------------------

