      - generic [ref=e58]:
        - heading "Plomberie" [level=2] [ref=e59]
        - paragraph [ref=e60]:
          - text: La plomberie s’intéresse à la circulation de l’eau dans votre maison.
          - text: Elle regroupe la zinguerie, le chauffage central et la plomberie sanitaire.
          - text: Elle intervient dès l’arrivée d’eau et s’arrête au raccordement des canalisations au réseau collectif d’évacuation.
          - text: Si ce raccordement n’est pas possible, elle intègre aussi la « fosse toutes eaux » ou toute autre solution choisie
          - text: pour traiter les eaux usées. Son rôle est donc capital tant pour assurer un confort aux occupants (alimentation en eau potable, eau chaude sanitaire) que pour leur garantir une sécurité d’utilisation. L’explosion des nouveaux matériaux et des nouvelles propositions en matière de chauffage a bouleversé sa pratique, qui d’ailleurs devient souvent plus facile à mettre en œuvre.
